services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clawd_claude_dev_2026
      POSTGRES_DB: clawdxcraft
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:PASSWORD@db:5432/clawdxcraft
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-in-prod
      PYTHONPATH: /app/src/backend:/app
      ENFORCEMENT_MODE: ${ENFORCEMENT_MODE:-observe}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./bots:/app/bots
      - .:/app
    command: uvicorn src.backend.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ticker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:PASSWORD@db:5432/clawdxcraft
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: clawdxcraft-dev-secret-change-in-prod
      PYTHONPATH: /app/src/backend:/app
      ENFORCEMENT_MODE: ${ENFORCEMENT_MODE:-observe}
      TICK_RATE: ${TICK_RATE:-10}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
    volumes:
      - ./bots:/app/bots
      - .:/app
    command: python src/backend/scripts/run_ticker.py

  market-maker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:PASSWORD@db:5432/clawdxcraft
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: clawdxcraft-dev-secret-change-in-prod
      PYTHONPATH: /app/src/backend:/app
      ENFORCEMENT_MODE: ${ENFORCEMENT_MODE:-observe}
      MARKET_MAKER_INTERVAL: 30
      GITHUB_WATCHLIST: "anthropics/claude-code,langchain-ai/langchain"
      NEWS_KEYWORDS: "AI,Crypto,Regulation"
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
    volumes:
      - ./bots:/app/bots
      - .:/app
    command: python src/backend/scripts/run_market_maker.py

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    restart: always

  # Optional: Local LLM via Ollama (start with: docker compose --profile ollama up -d)
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  ollama_data:
